<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Folders - wonderonpathlesspath</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        h1 {
            color: #333;
        }
        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .folder-card {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .folder-card:hover {
            background: #e0e0e0;
        }
        .folder-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .folder-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .folder-count {
            color: #666;
            font-size: 14px;
        }
        .back-link {
            color: #0066cc;
            text-decoration: none;
            margin-bottom: 20px;
            display: inline-block;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Home</a>
        <h1>Photo Folders</h1>
        <p>Click on any folder to view photos</p>

        <div class="folder-grid">
            <a href="animals/" class="folder-card">
                <div class="folder-icon">🦁</div>
                <div class="folder-name">Animals</div>
                <div class="folder-count">2 photos</div>
            </a>
            <a href="architecture/" class="folder-card">
                <div class="folder-icon">🏛️</div>
                <div class="folder-name">Architecture</div>
                <div class="folder-count">2 photos</div>
            </a>
            <a href="food/" class="folder-card">
                <div class="folder-icon">🍕</div>
                <div class="folder-name">Food</div>
                <div class="folder-count">0 photos</div>
            </a>
            <a href="nature/" class="folder-card">
                <div class="folder-icon">🌳</div>
                <div class="folder-name">Nature</div>
                <div class="folder-count">4 photos</div>
            </a>
            <a href="people/" class="folder-card">
                <div class="folder-icon">👥</div>
                <div class="folder-name">People</div>
                <div class="folder-count">4 photos</div>
            </a>
            <a href="sunset/" class="folder-card">
                <div class="folder-icon">🌅</div>
                <div class="folder-name">Sunset</div>
                <div class="folder-count">4 photos</div>
            </a>
            <a href="travel/" class="folder-card">
                <div class="folder-icon">✈️</div>
                <div class="folder-name">Travel</div>
                <div class="folder-count">0 photos</div>
            </a>
            <a href="urban/" class="folder-card">
                <div class="folder-icon">🏙️</div>
                <div class="folder-name">Urban</div>
                <div class="folder-count">4 photos</div>
            </a>
        </div>
    </div>
</body>
</html>
